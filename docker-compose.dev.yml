services:
  postgres:
    image: postgres:16-alpine
    container_name: sensai-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sensai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sensai_dev}
      POSTGRES_DB: ${POSTGRES_DB:-sensai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sensai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sensai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sensai-redis-dev
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - sensai_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  crawl4ai:
    image: unclecode/crawl4ai:0.8.6
    container_name: sensai-crawl4ai-dev
    restart: unless-stopped
    ports:
      - "${CRAWL4AI_PORT:-11235}:11235"
    shm_size: "1gb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sensai_pg_data:
  sensai_redis_data:
